name: Test Installation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test-compatibility:
    name: Security & Compatibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install dependencies
        run: cd scripts && bun install

      - name: Generate conversion outputs
        run: |
          cd scripts
          bun run convert-opencode.ts
          bun run convert-gemini.ts
          bun run convert-cortex.ts

      - name: Run compatibility tests
        run: cd scripts && bun run test-compatibility.ts

      - name: Run Go helper tests
        run: |
          cd plugins/lavra/hooks/memorysanitize
          go test -race ./...
          go vet ./...

      - name: Build Go helper release artifacts
        run: bash scripts/build-memory-sanitize-helper.sh

      - name: Verify catalog accuracy
        # SYNC: This step must stay in sync with the "Catalog accuracy" section
        # in scripts/pre-release-check.sh. When modifying either, update the other.
        run: |
          CATALOG_COMMANDS=$(grep -E '^\|' site/src/content/docs/CATALOG.md | \
            grep -oE '`/[a-z][a-z0-9-]+`' | tr -d '`' | sed 's|^/||' | sort -u)

          ACTUAL_COMMANDS=$(find plugins/lavra/commands -name "*.md" | \
            xargs -I{} basename {} .md 2>/dev/null | sort -u)

          FAIL=0

          while IFS= read -r cmd; do
            if ! echo "$ACTUAL_COMMANDS" | grep -qx "$cmd"; then
              echo "FAIL Catalog ghost: /${cmd} listed in CATALOG.md but no ${cmd}.md file found"
              FAIL=1
            fi
          done <<< "$CATALOG_COMMANDS"

          while IFS= read -r cmd; do
            if ! echo "$CATALOG_COMMANDS" | grep -qx "$cmd"; then
              echo "FAIL Missing from catalog: ${cmd}.md exists but /${cmd} not in CATALOG.md"
              FAIL=1
            fi
          done <<< "$ACTUAL_COMMANDS"

          [[ "$FAIL" -eq 0 ]] || exit 1
          echo "PASS Catalog accurate (no ghosts, no missing entries)"

  test-installation:
    name: Multi-Platform Installation Tests
    runs-on: macos-latest
    needs: test-compatibility
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install script dependencies
        run: cd scripts && bun install --frozen-lockfile

      - name: Install beads CLI
        run: brew install beads

      - name: Run installation tests
        run: bash scripts/test-installation.sh

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installation-test-logs
          path: /tmp/beads-install-test-*/

  test-npx-installer:
    name: npx Installer Smoke Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test --help flag
        run: node bin/install.js --help

      - name: Install beads CLI
        run: brew install beads

      - name: Test non-interactive Claude Code installation
        run: |
          mkdir -p /tmp/test-npx && cd /tmp/test-npx
          git init -q
          node "$GITHUB_WORKSPACE/bin/install.js" --claude --yes

      - name: Verify installation produced expected files
        run: |
          test -d /tmp/test-npx/.claude/hooks || { echo "Missing .claude/hooks"; exit 1; }
          test -d /tmp/test-npx/.claude/commands || { echo "Missing .claude/commands"; exit 1; }
          test -d /tmp/test-npx/.claude/agents || { echo "Missing .claude/agents"; exit 1; }
          echo "All expected directories present"

      - name: Clean up
        if: always()
        run: rm -rf /tmp/test-npx

  verify-release:
    # SYNC: This job must stay in sync with scripts/pre-release-check.sh.
    # When modifying either file, update the other to match.
    name: Verify Release Readiness
    runs-on: ubuntu-latest
    needs: [test-compatibility, test-installation, test-npx-installer]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Generate conversion outputs for verification
        run: |
          cd scripts
          bun install --frozen-lockfile
          bun run convert-opencode.ts
          bun run convert-gemini.ts
          bun run convert-cortex.ts

      - name: Verify version consistency
        run: |
          PLUGIN_VERSION=$(jq -r '.version' plugins/lavra/.claude-plugin/plugin.json)
          MARKETPLACE_VERSION=$(jq -r '.plugins[] | select(.name == "lavra") | .version' .claude-plugin/marketplace.json)

          if [[ "$PLUGIN_VERSION" != "$MARKETPLACE_VERSION" ]]; then
            echo "FAIL Version mismatch: plugin.json=$PLUGIN_VERSION, marketplace.json=$MARKETPLACE_VERSION"
            exit 1
          fi

          echo "PASS Versions consistent: $PLUGIN_VERSION"

      - name: Verify component counts
        run: |
          COMMANDS=$(find plugins/lavra/commands -maxdepth 1 -name "*.md" | wc -l)
          AGENTS=$(find plugins/lavra/agents -name "*.md" | wc -l)
          SKILLS=$(find plugins/lavra/skills -name "SKILL.md" | wc -l)

          echo "Commands: $COMMANDS (expected 18+)"
          echo "Agents: $AGENTS (expected 30+)"
          echo "Skills: $SKILLS (expected 21+)"

          [[ "$COMMANDS" -ge 18 ]] || exit 1
          [[ "$AGENTS" -ge 30 ]] || exit 1
          [[ "$SKILLS" -ge 21 ]] || exit 1

          echo "PASS Component counts verified"

      - name: Verify source files and conversion outputs
        run: |
          # Verify source files exist
          [[ -f "plugins/lavra/opencode-src/plugin.ts" ]] || { echo "FAIL OpenCode plugin.ts source missing"; exit 1; }
          [[ -f "plugins/lavra/opencode-src/package.json" ]] || { echo "FAIL OpenCode package.json source missing"; exit 1; }
          [[ -f "plugins/lavra/gemini-src/settings.json" ]] || { echo "FAIL Gemini settings.json source missing"; exit 1; }

          # Verify generated outputs exist (from previous step)
          [[ -d "plugins/lavra/opencode" ]] || { echo "FAIL OpenCode conversion outputs missing"; exit 1; }
          [[ -d "plugins/lavra/gemini" ]] || { echo "FAIL Gemini conversion outputs missing"; exit 1; }

          OPENCODE_COMMANDS=$(find plugins/lavra/opencode/commands -name "*.md" 2>/dev/null | wc -l)
          [[ "$OPENCODE_COMMANDS" -ge 18 ]] || { echo "FAIL OpenCode .md commands missing"; exit 1; }

          GEMINI_TOML=$(find plugins/lavra/gemini/commands -name "*.toml" 2>/dev/null | wc -l)
          [[ "$GEMINI_TOML" -ge 18 ]] || { echo "FAIL Gemini .toml commands missing"; exit 1; }

          CORTEX_COMMANDS=$(find plugins/lavra/cortex/commands -name "*.md" 2>/dev/null | wc -l)
          [[ "$CORTEX_COMMANDS" -ge 18 ]] || { echo "FAIL Cortex .md commands missing"; exit 1; }

          echo "PASS All source files and conversion outputs verified"

      - name: Verify Go helper
        run: |
          test -f plugins/lavra/hooks/memorysanitize/go.mod || { echo "FAIL Go helper module missing"; exit 1; }
          cd plugins/lavra/hooks/memorysanitize
          go test -race ./...
          go vet ./...
          cd "$GITHUB_WORKSPACE"
          bash scripts/build-memory-sanitize-helper.sh

      - name: Verify catalog accuracy
        # SYNC: This step must stay in sync with the "Catalog accuracy" section
        # in scripts/pre-release-check.sh. When modifying either, update the other.
        run: |
          CATALOG_COMMANDS=$(grep -E '^\|' site/src/content/docs/CATALOG.md | \
            grep -oE '`/[a-z][a-z0-9-]+`' | tr -d '`' | sed 's|^/||' | sort -u)

          ACTUAL_COMMANDS=$(find plugins/lavra/commands -name "*.md" | \
            xargs -I{} basename {} .md 2>/dev/null | sort -u)

          FAIL=0

          while IFS= read -r cmd; do
            if ! echo "$ACTUAL_COMMANDS" | grep -qx "$cmd"; then
              echo "FAIL Catalog ghost: /${cmd} listed in CATALOG.md but no ${cmd}.md file found"
              FAIL=1
            fi
          done <<< "$CATALOG_COMMANDS"

          while IFS= read -r cmd; do
            if ! echo "$CATALOG_COMMANDS" | grep -qx "$cmd"; then
              echo "FAIL Missing from catalog: ${cmd}.md exists but /${cmd} not in CATALOG.md"
              FAIL=1
            fi
          done <<< "$ACTUAL_COMMANDS"

          [[ "$FAIL" -eq 0 ]] || exit 1
          echo "PASS Catalog accurate (no ghosts, no missing entries)"

      - name: Prose style check (warn only)
        continue-on-error: true
        # SYNC: This step must stay in sync with the "Prose style check" section
        # in scripts/pre-release-check.sh. When modifying either, update the other.
        run: |
          FILLER='Make sure to|Note that|Be sure to|you will|In order to|simply|basically|actually'
          if ! command -v rg &>/dev/null; then
            echo "WARN  ripgrep (rg) not installed — skipping prose style check"
          elif rg --quiet "$FILLER" plugins/lavra/commands/ plugins/lavra/skills/ plugins/lavra/agents/ 2>/dev/null; then
            echo "WARN: Filler phrases found (not blocking release):"
            rg --no-heading -n "$FILLER" plugins/lavra/commands/ plugins/lavra/skills/ plugins/lavra/agents/ | head -20
          else
            echo "PASS No filler phrases detected"
          fi
