name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/lavra-command-map.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Copy command map to public
        run: cp docs/lavra-command-map.html site/public/command-map.html

      - name: Install dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Build site
        run: cd site && bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
