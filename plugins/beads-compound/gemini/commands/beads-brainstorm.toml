## Execution Flow

### Phase 0: Assess Requirements Clarity

Evaluate whether brainstorming is needed based on the feature description.

**Clear requirements indicators:**
- Specific acceptance criteria provided
- Referenced existing patterns to follow
- Described exact expected behavior
- Constrained, well-defined scope

**If requirements are already clear:**
Use **AskUserQuestion tool** to suggest: "Your requirements seem detailed enough to proceed directly to planning. Should I run `/beads-plan` instead, or would you like to explore the idea further?"

### Phase 1: Understand the Idea

#### 1.1 Repository Research (Lightweight)

Run a quick repo scan to understand existing patterns:

- Task repo-research-analyst("Understand existing patterns related to: <feature_description>")

Focus on: similar features, established patterns, CLAUDE.md or AGENTS.md guidance.

#### 1.2 Check Existing Knowledge

Search for relevant knowledge from past sessions:

```bash
.beads/memory/recall.sh "{keywords from feature description}"
```

Present any relevant entries that might inform the brainstorm.

#### 1.3 Collaborative Dialogue

Use the **AskUserQuestion tool** to ask questions **one at a time**.

**Guidelines (see `brainstorming` skill for detailed techniques):**
- Prefer multiple choice when natural options exist
- Start broad (purpose, users) then narrow (constraints, edge cases)
- Validate assumptions explicitly
- Ask about success criteria

**Exit condition:** Continue until the idea is clear OR user says "proceed"

### Phase 2: Explore Approaches

Propose **2-3 concrete approaches** based on research and conversation.

For each approach, provide:
- Brief description (2-3 sentences)
- Pros and cons
- When it's best suited

Lead with your recommendation and explain why. Apply YAGNI - prefer simpler solutions.

Use **AskUserQuestion tool** to ask which approach the user prefers.

### Phase 3: Capture the Design

Create a brainstorm bead and log findings as comments:

```bash
# Create brainstorm bead
bd create "Brainstorm: {topic}" --type chore --labels brainstorm -d "{summary of what we're exploring}"

# Log key decisions
bd comments add {BEAD_ID} "DECISION: {approach chosen and why}"
bd comments add {BEAD_ID} "INVESTIGATION: {key findings from exploration}"
bd comments add {BEAD_ID} "FACT: {constraints discovered}"
bd comments add {BEAD_ID} "PATTERN: {patterns to follow}"
```

### Phase 4: Handoff

Use **AskUserQuestion tool** to present next steps:

**Question:** "Brainstorm captured as {BEAD_ID}. What would you like to do next?"

**Options:**
1. **Proceed to planning** - Run `/beads-plan` (will auto-detect this brainstorm's knowledge)
2. **Refine design further** - Continue exploring
3. **Done for now** - Return later

## Output Summary

