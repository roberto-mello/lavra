.preset-btn:hover { background: #263040; color: #e2e8f0; }
.preset-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

.toggle-row input { cursor: pointer; accent-color: #3b82f6; }
.swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.toggle-row span { font-size: 11px; color: #9ca3af; }
.comments-list { flex: 1; overflow-y: auto; padding: 8px; }
.comment-item { background: #1a2235; border: 1px solid #2d3748; border-radius: 4px; padding: 7px 8px; margin-bottom: 5px; }
.comment-target { font-size: 10px; font-weight: 600; color: #60a5fa; margin-bottom: 3px; }
.comment-text { font-size: 11px; color: #94a3b8; line-height: 1.4; }
.comment-del { float: right; cursor: pointer; color: #4b5563; font-size: 10px; }
.comment-del:hover { color: #f87171; }
.no-comments { font-size: 11px; color: #374151; padding: 4px; font-style: italic; }

/* -- Canvas -- */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0b0f1a; }
#diagram { width: 100%; height: 100%; cursor: grab; }
#diagram.grabbing { cursor: grabbing; }

.zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 3px; }
.zoom-btn { width: 26px; height: 26px; background: #1f2937; border: 1px solid #374151; border-radius: 4px; color: #9ca3af; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.zoom-btn:hover { background: #374151; color: #e2e8f0; }

.hint { position: absolute; top: 10px; right: 12px; font-size: 10px; color: #374151; pointer-events: none; }

/* -- Prompt bar -- */
.prompt-bar { border-top: 1px solid #1f2937; padding: 8px 14px; background: #111827; display: flex; align-items: flex-start; gap: 10px; min-height: 56px; max-height: 100px; }

.copy-btn { padding: 4px 10px; background: #1f2937; border: 1px solid #374151; border-radius: 4px; color: #9ca3af; font-size: 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.12s; }

.copy-btn.copied { background: #14432a; border-color: #22c55e; color: #4ade80; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }

/* -- Pipeline highlight -- */

                   'ag-arch','ag-security','ag-perf','ag-simplicity',
                   'sk-brainstorming',
                   'kn-recall','kn-jsonl'],
  review: ['beads-review','beads-work',
           'ag-rails','ag-dhh','ag-ts','ag-python','ag-security','ag-perf','ag-simplicity','ag-arch',
           'ag-migration','ag-drift','ag-deploy','ag-integrity','ag-pattern','ag-races','ag-git',
           'kn-capture'],
  knowledge: ['beads-work','beads-design','beads-brainstorm','beads-research','beads-review',
              'beads-learn','beads-retro','beads-recall',
              'kn-jsonl','kn-recall','kn-capture','kn-fts5'],
};

// == State ==
const state = {
  scale:1, tx:0, ty:0,
  layers:{ commands:true, agents:true, skills:true, knowledge:true },
  connTypes:{ orchestrates:true, dispatches:true, suggests:true, feeds:true },
  comments:[], hovered:null, preset:'full',
};
let activePreset = null;

// == Styles ==
const NODE_STYLE = {
  commands:  { fill:'#0f2040', stroke:'#1d4ed8', textFill:'#93c5fd', subFill:'#334155' },
  agents:    { fill:'#0a2015', stroke:'#15803d', textFill:'#86efac', subFill:'#334155' },
  skills:    { fill:'#1e0a2a', stroke:'#9333ea', textFill:'#e879f9', subFill:'#334155' },
  knowledge: { fill:'#1a1500', stroke:'#d97706', textFill:'#fbbf24', subFill:'#334155' },
};
const CONN_STYLE = {
  orchestrates: { color:'#3b82f6', dash:'',    w:1.8, opacity:0.9 },
  dispatches:   { color:'#22c55e', dash:'',    w:1.4, opacity:0.9 },
  suggests:     { color:'#8b5cf6', dash:'5,3', w:1.4, opacity:0.9 },
  feeds:        { color:'#f59e0b', dash:'3,3', w:1.4, opacity:0.9 },
};
const BAND_LABELS = [
  { label:'PRIMARY PIPELINE', y:BY.pipeline-18, color:'#1e3a5f' },
  { label:'DESIGN PHASES (orchestrated by /beads-design)', y:BY.design_phases-18, color:'#1a2a4a' },
  { label:'SUPPORTING COMMANDS', y:BY.supporting-18, color:'#1a1a2a' },
  { label:'SPECIALIZED / UTILITY', y:BY.specialized-18, color:'#1a1a1a' },
  { label:'CORE SKILLS', y:BY.skills-18, color:'#200a2a' },
  { label:'KNOWLEDGE SYSTEM', y:BY.knowledge-18, color:'#1a1500' },
  { label:'REVIEW AGENTS (15)', y:BY.review_agents-18, color:'#0a200a' },
  { label:'RESEARCH AGENTS (5)', y:BY.research_agents-18, color:'#0a200a' },
];

// == SVG helpers ==
const svg = document.getElementById('diagram');
let gMain;

function el(tag, attrs={}, text) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function nById(id) { return NODES.find(n=>n.id===id); }

function visible(n) {
  if (!state.layers[n.layer]) return false;
  if (activePreset && !activePreset.includes(n.id)) return false;
  return true;
}

// == Elbow path ==
function elbowPath(a, b) {
  const ax = a.x + a.w/2, ay = a.y + a.h/2;
  const bx = b.x + b.w/2, by = b.y + b.h/2;
  const goingDown = by > ay;
  const x1 = ax,  y1 = goingDown ? a.y + a.h : a.y;
  const x2 = bx,  y2 = goingDown ? b.y       : b.y + b.h;
  const my = (y1 + y2) / 2;
  return `M ${x1} ${y1} L ${x1} ${my} L ${x2} ${my} L ${x2} ${y2}`;
}

function sameBandPath(a, b) {
  const goRight = b.x > a.x;
  const y = a.y + a.h / 2;
  const x1 = goRight ? a.x + a.w : a.x;
  const x2 = goRight ? b.x + 7   : b.x + b.w - 7;
  return `M ${x1} ${y} L ${x2} ${y}`;
}

function buildPath(a, b) {
  if (Math.abs((a.y + a.h/2) - (b.y + b.h/2)) < 20) return sameBandPath(a, b);
  return elbowPath(a, b);
}

// == Render ==
function render() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const defs = el('defs');
  for (const [type, s] of Object.entries(CONN_STYLE)) {
    const m = el('marker', { id:`arr-${type}`, markerWidth:'7', markerHeight:'5', refX:'6', refY:'2.5', orient:'auto' });
    m.appendChild(el('polygon', { points:'0 0,7 2.5,0 5', fill:s.color }));
    defs.appendChild(m);
  }
  svg.appendChild(defs);

  gMain = el('g');
  gMain.setAttribute('transform', `translate(${state.tx},${state.ty}) scale(${state.scale})`);
  svg.appendChild(gMain);

  // Swim lane backgrounds
  const allVis = NODES.filter(visible);
  if (allVis.length) {
    const totalW = Math.max(...allVis.map(n=>n.x+n.w)) + 40;
    BAND_LABELS.forEach(band => {
      const bandTop = band.y + 18;
      const nodesInBand = allVis.filter(n => n.y >= bandTop - 10 && n.y < bandTop + 70);
      if (!nodesInBand.length) return;
      const maxY = Math.max(...nodesInBand.map(n => n.y + n.h));
      const bandH = maxY - band.y + 10;
      const bg = el('rect', { x:0, y:band.y, width:totalW, height:bandH, fill:band.color, opacity:'0.4', rx:'4' });
      gMain.appendChild(bg);
      gMain.appendChild(el('text', { x:8, y:band.y+10, fill:'#374151', 'font-size':'8',
        'font-weight':'700', 'font-family':'-apple-system,sans-serif', 'letter-spacing':'0.08em' }, band.label));
    });
  }

  // Determine highlights
  const hov = state.hovered;
  const connectedIds = new Set();
  if (hov) {
    CONNS.forEach(c => { if (c.from===hov||c.to===hov) { connectedIds.add(c.from); connectedIds.add(c.to); } });
  }

  // Draw connections
  CONNS.filter(c => {
    if (!state.connTypes[c.type]) return false;
    const a = nById(c.from), b = nById(c.to);
    return a && b && visible(a) && visible(b);
  }).forEach(c => {
    const a = nById(c.from), b = nById(c.to);
    const s = CONN_STYLE[c.type];
    const isHi = hov && (c.from===hov || c.to===hov);
    const isDim = hov && !isHi;
    const opacity = isDim ? 0.07 : (hov ? 0.95 : 0.25);

    const d = buildPath(a, b);
    gMain.appendChild(el('path', {
      d, fill:'none',
      stroke: s.color,
      'stroke-width': isHi ? s.w * 1.8 : s.w,
      'stroke-dasharray': s.dash,
      'stroke-opacity': opacity,
      'marker-end': `url(#arr-${c.type})`,
    }));

    if (c.label && isHi) {
      const ax=a.x+a.w/2, bx=b.x+b.w/2;
      const ay = a.y+a.h, by2 = b.y;
      const my = (ay+by2)/2;
      const lx = (ax+bx)/2;
      const tw = c.label.length * 5 + 12;
      gMain.appendChild(el('rect', { x:lx-tw/2, y:my-8, width:tw, height:13, rx:2, fill:'#0b0f1a', opacity:'0.9' }));
      gMain.appendChild(el('text', { x:lx, y:my+2, 'text-anchor':'middle', fill:s.color,
        'font-size':'8', 'font-family':'-apple-system,sans-serif', opacity:'1' }, c.label));
    }
  });

  // Draw nodes
  NODES.filter(visible).forEach(n => drawNode(n, connectedIds, hov));
}

function drawNode(n, connectedIds, hov) {
  const s = NODE_STYLE[n.layer];
  const isHov = hov === n.id;
  const isConnected = connectedIds.has(n.id);
  const isDim = hov && !isHov && !isConnected;
  const hasComment = state.comments.some(c=>c.target===n.id);
  const isPipeline = n.group === 'pipeline';

  const grp = el('g', { cursor:'pointer', opacity: isDim ? '0.2' : '1' });
  grp.addEventListener('mouseenter', () => { state.hovered = n.id; render(); });
  grp.addEventListener('mouseleave', () => { state.hovered = null; render(); });
  grp.addEventListener('click', () => openModal(n));

  const stroke = isHov ? '#fff' : (hasComment ? '#f97316' : (isPipeline && !hov ? '#60a5fa' : s.stroke));
  const sw = isHov ? 2 : (isPipeline && !hov ? 1.8 : (hasComment ? 1.5 : 1));

  grp.appendChild(el('rect', { x:n.x, y:n.y, width:n.w, height:n.h, rx:5,
    fill: isHov ? '#1a2a40' : s.fill,
    stroke, 'stroke-width':sw }));

  grp.appendChild(el('text', { x:n.x+n.w/2, y:n.y+(n.sub?13:21),
    'text-anchor':'middle', fill:s.textFill, 'font-size':'10.5', 'font-weight':'600',
    'font-family':"'SF Mono','Fira Code',monospace" }, n.label));

  if (n.sub) {
    grp.appendChild(el('text', { x:n.x+n.w/2, y:n.y+25,
      'text-anchor':'middle', fill:'#4b5563', 'font-size':'8.5',
      'font-family':'-apple-system,sans-serif' }, n.sub));
  }

  if (hasComment) {
    grp.appendChild(el('circle', { cx:n.x+n.w-5, cy:n.y+5, r:3.5, fill:'#f97316' }));
  }

  gMain.appendChild(grp);
}

// == Zoom / Pan ==
function doZoom(f) {
  state.scale = Math.min(4, Math.max(0.15, state.scale*f));
  render();
}

function fitView() {
  const vis = NODES.filter(visible);
  if (!vis.length) return;
  const rect = svg.getBoundingClientRect();
  const minX = Math.min(...vis.map(n=>n.x)) - 20;
  const maxX = Math.max(...vis.map(n=>n.x+n.w)) + 20;
  const minY = Math.min(...vis.map(n=>n.y)) - 30;
  const maxY = Math.max(...vis.map(n=>n.y+n.h)) + 20;
  const cw = maxX-minX, ch = maxY-minY;
  state.scale = Math.min(rect.width/cw, rect.height/ch, 1.2);
  state.tx = rect.width/2 - (minX+cw/2)*state.scale;
  state.ty = rect.height/2 - (minY+ch/2)*state.scale;
  render();
}

let dragging=false, ds={x:0,y:0}, do_={x:0,y:0};
svg.addEventListener('mousedown', e => {
  if (e.target.closest('g[cursor="pointer"]')) return;
  dragging=true; ds={x:e.clientX,y:e.clientY}; do_={x:state.tx,y:state.ty};
  svg.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  state.tx=do_.x+(e.clientX-ds.x); state.ty=do_.y+(e.clientY-ds.y); render();
});
window.addEventListener('mouseup', () => { dragging=false; svg.classList.remove('grabbing'); });
svg.addEventListener('wheel', e => { e.preventDefault(); doZoom(e.deltaY<0?1.12:0.89); }, {passive:false});

// == Presets ==
function applyPreset(btn, name) {
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.preset = name;
  activePreset = PRESET_NODES[name];
  const has = l => !activePreset || activePreset.some(id=>{ const n=nById(id); return n&&n.layer===l; });
  ['commands','agents','skills','knowledge'].forEach((l,i) => {
    state.layers[l] = has(l);
    document.querySelectorAll('.sidebar input[type=checkbox]')[i].checked = state.layers[l];
  });
  render(); setTimeout(fitView, 10); updatePrompt();
}

function toggleLayer(l, v) { state.layers[l]=v; render(); updatePrompt(); }
function toggleConn(t, v) { state.connTypes[t]=v; render(); updatePrompt(); }

// == Comments ==
let modalNode=null;
function openModal(n) {
  modalNode=n;
  document.getElementById('modal-title').textContent = n.label;
  document.getElementById('modal-sub').textContent = n.sub||'';
  document.getElementById('modal-input').value='';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); modalNode=null; }
function saveComment() {
  const t=document.getElementById('modal-input').value.trim();
  if (!t) { closeModal(); return; }
  state.comments.push({id:Date.now(), target:modalNode.id, targetLabel:modalNode.label, text:t});
  closeModal(); renderComments(); render(); updatePrompt();
}
function deleteComment(id) {
  state.comments=state.comments.filter(c=>c.id!==id);
  renderComments(); render(); updatePrompt();
}
function renderComments() {
  const list=document.getElementById('comments-list');
  document.getElementById('comment-count').textContent=state.comments.length;
  if (!state.comments.length) { list.innerHTML='<div class="no-comments">Hover a node to highlight connections. Click to comment.</div>'; return; }
  list.innerHTML=state.comments.map(c=>`
    <div class="comment-item">
      <div class="comment-target">${c.targetLabel}<span class="comment-del" onclick="deleteComment(${c.id})"> x</span></div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('');
}

// == Prompt ==
function updatePrompt() {
  const labels={full:'full system',pipeline:'primary pipeline','design-deep':'design deep dive',review:'review pipeline',knowledge:'knowledge flow'};
  const parts=[`beads-compound v2 architecture -- ${labels[state.preset]||state.preset} view.`];
  const hiddenL=Object.entries(state.layers).filter(([,v])=>!v).map(([k])=>k);
  if (hiddenL.length) parts.push(`Hidden: ${hiddenL.join(', ')}.`);
  const hiddenC=Object.entries(state.connTypes).filter(([,v])=>!v).map(([k])=>k);
  if (hiddenC.length) parts.push(`Connection types hidden: ${hiddenC.join(', ')}.`);
  if (state.comments.length) {
    parts.push('');
    state.comments.forEach(c=>parts.push(`[${c.targetLabel}] ${c.text}`));
  }
  document.getElementById('prompt-text').textContent=parts.join('\n');
}

// == Copy ==
function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt-text').textContent);
  const b=document.getElementById('copy-btn');
  b.textContent='Copied!'; b.classList.add('copied');
  setTimeout(()=>{ b.textContent='Copy'; b.classList.remove('copied'); }, 1500);
}

// == Keyboard ==
window.addEventListener('keydown', e=>{
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && !e.shiftKey && document.getElementById('modal-bg').classList.contains('open')) {
    e.preventDefault(); saveComment();
  }
});

// == Init ==
render();
setTimeout(fitView, 60);
updatePrompt();
</script>
</body>
</html>
